<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
    <li><a href="menu.html">Home</a></li>

    <h1>Informações Pessoais</h1>
<body>
    <fieldset>
        <legend>Cadastro do Cliente</legend>

        <form action="menu.html" method="post">
            <br>
        <div>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" placeholder="Digite o nome do cliente" size="50">
        </div>
            <br>
        <div>
            <label for="idade">Idade:</label>
            <input type="number" name="idade" id="idade" placeholder="Digite a idade" size="20">
        </div>
            <br>
        <div>
            <label for="endereco">Endereço:</label>
            <input type="text" name="endereco" id="endereco" placeholder="Digite o endereço" size="70">
        </div>
            <br>
        <div>
            <label for="cidade">Cidade:</label>
            <input type="text" name="cidade" id="cidade" placeholder="Digite a cidade" size="60">
        </div>
            <br>
        <div>
            <label for="estado">Estado:</label>
            <input type="text" name="estado" id="estado" placeholder="UF" size="40">
        </div>
            <br>
        <div>
            <label for="cep">CEP:</label>
            <input type="number" name="cep" id="cep" placeholder="XXXXX-XXX" size="40">
        </div>
            <br>
        <div>
            <label for="telefone">Tel/Res:</label>
            <input type="number" name="telefone" id="telefone" placeholder="99 99999-9999" size="40">
        </div>
            <br>
        <div>
            <label for="celular">Tel/Cel: </label>
            <input type="number" name="celular" id="celular" placeholder="99 99999-9999" size="40">
        </div>
            <br>
        <div>
            <label for="email">Email:</label>
            <input type="text" name="email" id="email" placeholder="Digite o endereço de email" size="60">
        </div>
            <br>
    </fieldset>
        </form>
            <input type="submit" name="" id="">

</body>
</html>
